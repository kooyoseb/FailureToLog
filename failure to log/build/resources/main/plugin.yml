name: FailureToLog
version: '1.0-SNAPSHOT'

main: org.kooyoseb.failureToLog.FailureToLog
api-version: '26.X'
load: POSTWORLD
commands:
  failuretolog:
    description: Manage FailureToLog.
    usage: /failuretolog <toggle|savelogs|codes|log>
    aliases: [ftl]
permissions:
  failuretolog.admin:
    description: Allows changing FailureToLog settings.
    default: op
